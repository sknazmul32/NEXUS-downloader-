services:
  - type: web
    name: NEXUS-downloader-
    env: python
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: PYTHON_VERSION
        value: 3.10.14
